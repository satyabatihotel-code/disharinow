<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Dishari Login</title>

<style>
body{
font-family:Arial;
background:#f3f6fb;
display:flex;
justify-content:center;
align-items:center;
height:100vh;
margin:0;
}

.box{
width:90%;
max-width:400px;
background:white;
padding:25px;
border-radius:20px;
box-shadow:0 10px 25px rgba(0,0,0,0.1);
}

input{
width:100%;
padding:12px;
margin:8px 0;
border:none;
background:#f1f3f7;
border-radius:10px;
}

button{
width:100%;
padding:12px;
background:#1877F2;
color:white;
border:none;
border-radius:10px;
font-weight:bold;
}

h2{
text-align:center;
color:#1877F2;
}

#home{
display:none;
text-align:center;
}
</style>
</head>

<body>

<div class="box" id="loginBox">

<h2>Dishari Login</h2>

<input id="user" placeholder="User Name">
<input id="pass" placeholder="Phone Number">

<button onclick="login()">Login</button>

</div>

<div id="home">
<h2>Welcome <span id="name"></span></h2>
<button onclick="logout()">Logout</button>
</div>

<script>

/* YOUR SHEET CSV EXPORT LINK */
const SHEET_URL =
"https://docs.google.com/spreadsheets/d/12klOqNz4ER47bvsZrvqJMkYnghi_T63J_LmaYvNeb9c/gviz/tq?tqx=out:json";

async function login(){

let u=document.getElementById("user").value.trim();
let p=document.getElementById("pass").value.trim();

if(!u || !p){
alert("Fill all fields");
return;
}

let res=await fetch(SHEET_URL);
let text=await res.text();

let json=JSON.parse(text.substr(47).slice(0,-2));

let rows=json.table.rows;

let found=false;

for(let r of rows){

let name=r.c[0]?.v;
let phone=r.c[1]?.v;

if(name==u && phone==p){
found=true;
break;
}

}

if(found){

localStorage.setItem("user",u);

showHome(u);

}else{

alert("Invalid Login");

}

}

function showHome(u){
document.getElementById("loginBox").style.display="none";
document.getElementById("home").style.display="block";
document.getElementById("name").innerText=u;
}

function logout(){
localStorage.clear();
location.reload();
}

window.onload=function(){
let u=localStorage.getItem("user");
if(u){
showHome(u);
}
}

</script>

</body>
</html>
