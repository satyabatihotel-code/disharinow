<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Dishari Login System</title>

<style>
body{
margin:0;
font-family:Arial;
background:#f3f6fb;
display:flex;
justify-content:center;
align-items:center;
height:100vh;
}

.card{
width:92%;
max-width:420px;
background:#fff;
padding:25px;
border-radius:20px;
box-shadow:0 10px 25px rgba(0,0,0,0.1);
}

h2{
text-align:center;
color:#1877F2;
}

input{
width:100%;
padding:14px;
margin:8px 0;
border:none;
background:#f1f3f7;
border-radius:12px;
outline:none;
}

button{
width:100%;
padding:14px;
margin-top:10px;
border:none;
border-radius:12px;
background:#1877F2;
color:white;
font-weight:bold;
}

.link{
text-align:center;
margin-top:10px;
color:#1877F2;
cursor:pointer;
font-size:14px;
}

#signupBox{
display:none;
margin-top:10px;
}

.toast{
position:fixed;
bottom:20px;
background:#000;
color:#fff;
padding:10px 15px;
border-radius:10px;
display:none;
}

.home{
display:none;
text-align:center;
}

.home h1{
color:#1877F2;
}
</style>
</head>

<body>

<!-- LOGIN -->
<div class="card" id="authBox">

<h2>Dishari Login</h2>

<input id="loginUser" placeholder="User ID">
<input id="loginPhone" placeholder="Mobile Number">

<button onclick="login()">Login</button>

<div class="link" onclick="toggleSignup()">Create Account</div>
<div class="link" onclick="forgot()">Forgot Password</div>

<!-- SIGNUP -->
<div id="signupBox">

<input id="suUser" placeholder="Enter Name (min 6 chars)">
<input id="suPhone" placeholder="Mobile Number (10 digit)">

<button onclick="signup()">Sign Up</button>

</div>
</div>

<!-- HOME -->
<div class="home" id="homeBox">
<h1>Hi <span id="uname"></span></h1>
<p>Blank Home Page</p>
<button onclick="logout()">Logout</button>
</div>

<div class="toast" id="toast"></div>

<script>

/* ================= GOOGLE FORM ================= */

const FORM_URL = "https://docs.google.com/forms/d/e/1FAIpQLSfVFoHr73Z96fIijg-Yjk0909cMEuGpc4-vZl3gLGWhuaM7Rg/formResponse";

const ENTRY_USER = "entry.1163932746";
const ENTRY_PHONE = "entry.387551454";

/* ================= GOOGLE SHEET (Users tab) ================= */

const USERS_API = "https://opensheet.elk.sh/12klOqNz4ER47bvsZrvqJMkYnghi_T63J_LmaYvNeb9c/Users";

/* ================= TOAST ================= */

function show(msg){
let t=document.getElementById("toast");
t.innerText=msg;
t.style.display="block";
setTimeout(()=>t.style.display="none",2000);
}

/* ================= SIGNUP (SAVE TO GOOGLE SHEET) ================= */

async function signup(){

let u=document.getElementById("suUser").value.trim();
let p=document.getElementById("suPhone").value.trim();

if(u.length<6){
show("Min 6 characters required");
return;
}

if(p.length!=10){
show("Invalid phone number");
return;
}

let form=new FormData();
form.append(ENTRY_USER,u);
form.append(ENTRY_PHONE,p);

await fetch(FORM_URL,{
method:"POST",
mode:"no-cors",
body:form
});

show("Signup Success");

openHome(u);

}

/* ================= LOGIN (REAL GOOGLE SHEET CHECK) ================= */

async function login(){

let u=document.getElementById("loginUser").value.trim();
let p=document.getElementById("loginPhone").value.trim();

if(!u || !p){
show("Enter details");
return;
}

let res=await fetch(USERS_API);
let data=await res.json();

let user=data.find(x=>
(x["User Name"]==u || x["O"]==u || x["User ID"]==u) &&
(x["Phone"]==p || x["P"]==p || x["Mobile"]==p)
);

if(user){
show("Login Success");
openHome(u);
}else{
show("Invalid Login");
}

}

/* ================= HOME ================= */

function openHome(name){

document.getElementById("authBox").style.display="none";
document.getElementById("homeBox").style.display="block";
document.getElementById("uname").innerText=name;

localStorage.setItem("dishariUser",name);

}

/* ================= LOGOUT ================= */

function logout(){

localStorage.clear();
location.reload();

}

/* ================= SIGNUP TOGGLE ================= */

function toggleSignup(){

let s=document.getElementById("signupBox");

s.style.display=(s.style.display=="block")?"none":"block";

}

/* ================= FORGOT PASSWORD ================= */

async function forgot(){

let u=prompt("Enter User ID");

if(!u)return;

let res=await fetch(USERS_API);
let data=await res.json();

let user=data.find(x=>
x["User Name"]==u || x["O"]==u
);

if(user){

let phone=user["Phone"] || user["P"];

show("Registered: XXXXXXX"+phone.slice(-3));

}else{

show("User not found");

}

}

/* ================= AUTO LOGIN ================= */

window.onload=function(){

let u=localStorage.getItem("dishariUser");

if(u){

openHome(u);

}

}

</script>

</body>
</html>
