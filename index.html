<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Dishari Fashion</title>

<link rel="manifest" href="/disharinow/manifest.json">
<meta name="theme-color" content="#1877F2">

<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:Arial,sans-serif}
body{background:#f5f7fb;color:#111;padding-bottom:90px}
header{position:sticky;top:0;background:#1877F2;color:#fff;padding:15px;z-index:999;border-bottom-left-radius:18px;border-bottom-right-radius:18px;box-shadow:0 4px 15px rgba(0,0,0,.15)}
.topbar{display:flex;justify-content:space-between;align-items:center}
.search{width:100%;margin-top:12px;padding:12px;border:none;border-radius:14px;outline:none}
.banner{margin:15px;background:#fff;border-radius:20px;overflow:hidden;box-shadow:0 3px 12px rgba(0,0,0,.08)}
.banner img{width:100%;display:block}
.categories{display:flex;overflow:auto;gap:10px;padding:0 15px 10px}
.categories button{border:none;background:#fff;padding:10px 18px;border-radius:30px;white-space:nowrap;box-shadow:0 2px 8px rgba(0,0,0,.08)}
.products{display:grid;grid-template-columns:1fr 1fr;gap:12px;padding:15px}
.card{background:#fff;border-radius:18px;overflow:hidden;box-shadow:0 3px 12px rgba(0,0,0,.08);animation:fade .3s}
.card img{width:100%;height:230px;object-fit:cover}
.card-body{padding:10px}
.price{font-weight:bold;color:#1877F2}
.old{text-decoration:line-through;color:#888;font-size:12px}
.offer{background:#1877F2;color:#fff;font-size:11px;padding:4px 8px;border-radius:20px;display:inline-block;margin-top:6px}
.bottom-nav{position:fixed;bottom:0;left:0;width:100%;background:#fff;height:70px;display:flex;justify-content:space-around;align-items:center;border-top-left-radius:22px;border-top-right-radius:22px;box-shadow:0 -3px 12px rgba(0,0,0,.12);z-index:999}
.bottom-nav button{border:none;background:none;color:#555;font-size:12px}
.bottom-nav .active{color:#1877F2;font-weight:bold}
.modal{position:fixed;inset:0;background:#fff;z-index:9999;display:none;overflow:auto}
.modal img{width:100%;height:420px;object-fit:cover}
.close{position:fixed;top:15px;left:15px;background:#1877F2;color:#fff;border:none;padding:10px 14px;border-radius:50%}
.modal-content{padding:15px}
.stock-in{color:green;font-weight:bold}
.stock-out{color:red;font-weight:bold}
.btns{display:flex;gap:10px;margin-top:15px}
.btns button{flex:1;padding:14px;border:none;border-radius:14px;background:#1877F2;color:#fff;font-weight:bold}
.auth{position:fixed;inset:0;background:#f5f7fb;display:flex;align-items:center;justify-content:center;z-index:10000}
.auth-box{background:#fff;width:92%;max-width:420px;padding:25px;border-radius:24px;box-shadow:0 4px 20px rgba(0,0,0,.1)}
.auth-box h2{text-align:center;color:#1877F2;margin-bottom:18px}
.auth-box input{width:100%;padding:14px;border:none;background:#f1f3f7;border-radius:14px;margin-bottom:12px;outline:none}
.auth-box button{width:100%;padding:14px;background:#1877F2;color:#fff;border:none;border-radius:14px;font-weight:bold}
.link{text-align:center;margin-top:14px;color:#1877F2}
.page{display:none;padding:15px}
@keyframes fade{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:none}}
</style>
</head>
<body>

<div class="auth" id="authPage">
<div class="auth-box">
<h2>Dishari Fashion</h2>
<input type="text" id="loginUser" placeholder="Enter User ID">
<input type="tel" id="loginPass" placeholder="Enter Mobile Number">
<button onclick="login()">Sign In</button>
<div class="link" onclick="toggleSignup()">New User? Create Your Account</div>

<div id="signupBox" style="display:none;margin-top:15px">
<input type="text" id="signupUser" placeholder="Enter Your Name">
<input type="tel" id="signupPass" placeholder="Enter Mobile Number">
<button onclick="signup()">Sign Up</button>
</div>
</div>
</div>

<header>
<div class="topbar">
<h2>Hi <span id="username">Guest</span></h2>
<div>🛒</div>
</div>
<input type="text" class="search" placeholder="Search Products" onkeyup="searchProducts(this.value)">
</header>

<div id="homePage">
<div class="banner">
<img src="https://images.unsplash.com/photo-1610030469668-8e9f533afc5c?q=80&w=1200&auto=format&fit=crop" loading="eager">
</div>

<div class="categories">
<button onclick="loadProducts('New Arrivals')">New Arrivals</button>
<button onclick="loadProducts('Saree')">Saree</button>
<button onclick="loadProducts('Kurti')">Kurti</button>
<button onclick="loadProducts('All')">All</button>
</div>

<div class="products" id="products"></div>
</div>

<div class="page" id="cartPage">
<h2>My Cart</h2>
<div id="cartItems"></div>
</div>

<div class="page" id="trackPage">
<h2>Track Order</h2>
<br>
<input style="width:100%;padding:14px;border:none;border-radius:14px" placeholder="Enter Order ID">
<br><br>
<a href="https://wa.me/919999999999" target="_blank">
<button style="width:100%;padding:14px;border:none;border-radius:14px;background:#1877F2;color:#fff">WhatsApp Support</button>
</a>
</div>

<div class="page" id="growPage">
<h2>Grow Your Business</h2>
<br>
<p>Website Creation</p>
<p>Fashion Catalog Setup</p>
<p>App Development</p>
<p>Digital Branding</p>
</div>

<div class="modal" id="modal">
<button class="close" onclick="closeModal()">✕</button>
<img id="modalImage">
<div class="modal-content">
<h2 id="modalTitle"></h2>
<p id="modalDesc"></p>
<br>
<div id="modalPrice"></div>
<br>
<div id="modalStock"></div>
<br>
<p><b>Customer Reviews</b></p>
<p>⭐ Amazing quality product</p>
<p>⭐ Fast delivery and beautiful design</p>
<div class="btns">
<button onclick="closeModal()">More</button>
<button onclick="addToCart()">Add To Cart</button>
</div>
</div>
</div>

<div class="bottom-nav">
<button class="active" onclick="showPage('homePage',this)">Home</button>
<button onclick="showPage('homePage',this)">Products</button>
<button onclick="showPage('cartPage',this)">Cart</button>
<button onclick="showPage('trackPage',this)">Track</button>
<button onclick="showPage('growPage',this)">Grow</button>
</div>

<script>
const SHEET_URL='https://opensheet.elk.sh/12klOqNz4ER47bvsZrvqJMkYnghi_T63J_LmaYvNeb9c/Sheet1';
let allProducts=[];
let cart=[];
let currentProduct=null;

async function fetchProducts(){
const res=await fetch(SHEET_URL);
const data=await res.json();
allProducts=data.filter(p=>p.Show==='Yes');
loadProducts('New Arrivals');
}

function loadProducts(category){
const wrap=document.getElementById('products');
wrap.innerHTML='';
let filtered=category==='All'?allProducts:allProducts.filter(p=>p.Category===category);
filtered.forEach((p,i)=>{
const price=p['Today Offer']||p.Price;
wrap.innerHTML+=`
<div class="card" onclick='openModal(${JSON.stringify(p).replace(/'/g,"&apos;")})'>
<img src="${p['Image Url']}" loading="lazy">
<div class="card-body">
<h4>${p['Product Name']}</h4>
${p['Today Offer']?`<div class='old'>₹${p.Price}</div>`:''}
<div class='price'>₹${price}</div>
${p['Today Offer']?`<div class='offer'>Today Offer</div>`:''}
</div>
</div>`;
});
}

function searchProducts(v){
const wrap=document.getElementById('products');
wrap.innerHTML='';
const filtered=allProducts.filter(p=>p['Product Name'].toLowerCase().includes(v.toLowerCase())||p.Category.toLowerCase().includes(v.toLowerCase()));
filtered.forEach(p=>{
wrap.innerHTML+=`<div class="card" onclick='openModal(${JSON.stringify(p).replace(/'/g,"&apos;")})'><img src="${p['Image Url']}"><div class="card-body"><h4>${p['Product Name']}</h4><div class='price'>₹${p.Price}</div></div></div>`;
});
}

function openModal(p){
currentProduct=p;
document.getElementById('modal').style.display='block';
document.getElementById('modalImage').src=p['Image Url'];
document.getElementById('modalTitle').innerText=p['Product Name'];
document.getElementById('modalDesc').innerText=p.Description1+' '+(p.Description2||'');
document.getElementById('modalPrice').innerHTML=p['Today Offer']?`<span class='old'>₹${p.Price}</span> <span class='price'>₹${p['Today Offer']}</span>`:`<span class='price'>₹${p.Price}</span>`;
document.getElementById('modalStock').innerHTML=p.Stock==='0'?`<span class='stock-out'>Out Of Stock</span>`:`<span class='stock-in'>In Stock</span>`;
}

function closeModal(){document.getElementById('modal').style.display='none'}

function addToCart(){
cart.push(currentProduct);
localStorage.setItem('dishariCart',JSON.stringify(cart));
renderCart();
showPage('cartPage');
closeModal();
}

function renderCart(){
const items=document.getElementById('cartItems');
items.innerHTML='';
cart.forEach(c=>{
items.innerHTML+=`<div class='card' style='margin-bottom:10px'><div class='card-body'><h3>${c['Product Name']}</h3><div class='price'>₹${c.Price}</div></div></div>`;
});
}

function showPage(id,el){
document.querySelectorAll('#homePage,.page').forEach(p=>p.style.display='none');
document.getElementById(id).style.display='block';
document.querySelectorAll('.bottom-nav button').forEach(b=>b.classList.remove('active'));
if(el)el.classList.add('active');
}

function toggleSignup(){
document.getElementById('signupBox').style.display='block';
}

function signup(){
const user=document.getElementById('signupUser').value;
const pass=document.getElementById('signupPass').value;
if(user.length<6)return alert('Minimum six characters required');
if(pass.length!==10)return alert('Wrong Phone Number');
localStorage.setItem('dishariUser',user);
document.getElementById('username').innerText=user;
document.getElementById('authPage').style.display='none';
alert('Signup Success');
}

function login(){
const user=document.getElementById('loginUser').value;
const pass=document.getElementById('loginPass').value;
if(!user||!pass)return alert('Enter Login Details');
localStorage.setItem('dishariUser',user);
document.getElementById('username').innerText=user;
document.getElementById('authPage').style.display='none';
}

window.onload=()=>{
fetchProducts();
cart=JSON.parse(localStorage.getItem('dishariCart')||'[]');
renderCart();
const user=localStorage.getItem('dishariUser');
if(user){
 document.getElementById('username').innerText=user;
 document.getElementById('authPage').style.display='none';
}
}

if ('serviceWorker' in navigator) {
navigator.serviceWorker.register('/disharinow/service-worker.js');
}
</script>

</body>
</html>
