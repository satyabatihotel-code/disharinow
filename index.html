<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Dishari Login</title>

<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial,sans-serif;
}

body{
background:#f3f6fb;
min-height:100vh;
display:flex;
justify-content:center;
align-items:center;
padding:20px;
}

.auth-page{
width:100%;
max-width:420px;
background:#fff;
padding:30px 24px;
border-radius:28px;
box-shadow:0 10px 30px rgba(0,0,0,0.08);
animation:fade .5s ease;
}

.logo{
text-align:center;
font-size:34px;
font-weight:bold;
color:#1877F2;
margin-bottom:10px;
}

.sub{
text-align:center;
color:#666;
margin-bottom:30px;
font-size:14px;
}

.input-box{
margin-bottom:16px;
}

.input-box input{
width:100%;
padding:15px;
border:none;
outline:none;
background:#f1f4f9;
border-radius:16px;
font-size:15px;
transition:.3s;
}

.input-box input:focus{
background:#e8f0ff;
box-shadow:0 0 0 2px #1877F2;
}

.main-btn{
width:100%;
padding:15px;
border:none;
border-radius:16px;
background:#1877F2;
color:#fff;
font-size:16px;
font-weight:bold;
cursor:pointer;
}

.links{
display:flex;
justify-content:space-between;
margin-top:18px;
font-size:14px;
}

.links span{
color:#1877F2;
cursor:pointer;
}

.signup-box{
display:none;
margin-top:24px;
animation:slide .4s ease;
}

.toast{
position:fixed;
bottom:25px;
left:50%;
transform:translateX(-50%);
background:#111;
color:#fff;
padding:14px 18px;
border-radius:14px;
font-size:14px;
display:none;
z-index:999;
}

.home-page{
display:none;
width:100%;
height:100vh;
background:#fff;
padding:25px;
}

.home-box{
background:#1877F2;
color:#fff;
padding:20px;
border-radius:24px;
font-size:24px;
font-weight:bold;
}

.logout-btn{
margin-top:30px;
width:100%;
padding:15px;
border:none;
border-radius:16px;
background:#1877F2;
color:#fff;
font-size:16px;
font-weight:bold;
}

@keyframes fade{
from{opacity:0;transform:translateY(20px)}
to{opacity:1;transform:translateY(0)}
}

@keyframes slide{
from{opacity:0;transform:translateY(20px)}
to{opacity:1;transform:translateY(0)}
}
</style>
</head>
<body>

<!-- LOGIN PAGE -->
<div class="auth-page" id="authPage">

<div class="logo">Dishari</div>
<div class="sub">Premium Fashion Shopping App</div>

<div class="input-box">
<input type="text" id="loginUser" placeholder="Enter User ID">
</div>

<div class="input-box">
<input type="tel" id="loginPhone" placeholder="Enter Mobile Number">
</div>

<button class="main-btn" onclick="loginUser()">
Sign In
</button>

<div class="links">
<span onclick="forgotPassword()">Forgot Password</span>
<span onclick="toggleSignup()">Create Account</span>
</div>

<!-- SIGNUP -->
<div class="signup-box" id="signupBox">

<div class="input-box">
<input type="text" id="signupUser" placeholder="Enter Your Name">
</div>

<div class="input-box">
<input type="tel" id="signupPhone" placeholder="Enter Mobile Number">
</div>

<button class="main-btn" onclick="signupUser()">
Sign Up
</button>

</div>

</div>

<!-- BLANK HOME PAGE -->
<div class="home-page" id="homePage">

<div class="home-box">
Hi, <span id="userText"></span>
</div>

<button class="logout-btn" onclick="logoutUser()">
Logout
</button>

</div>

<div class="toast" id="toast"></div>

<script>

function toast(msg){
const t=document.getElementById('toast');
t.innerText=msg;
t.style.display='block';
setTimeout(()=>{
t.style.display='none';
},2500);
}

function toggleSignup(){
const box=document.getElementById('signupBox');
box.style.display=box.style.display==='block'?'none':'block';
}

function signupUser(){
const user=document.getElementById('signupUser').value.trim();
const phone=document.getElementById('signupPhone').value.trim();

if(user.length<6){
toast('Minimum six characters required');
return;
}

if(phone.length!==10){
toast('Wrong Phone Number');
return;
}

localStorage.setItem('dishariUser',user);
localStorage.setItem('dishariPhone',phone);
localStorage.setItem('dishariLogin','true');

openHome(user);

toast('Signup Success');
}

function loginUser(){
const user=document.getElementById('loginUser').value.trim();
const phone=document.getElementById('loginPhone').value.trim();

const savedUser=localStorage.getItem('dishariUser');
const savedPhone=localStorage.getItem('dishariPhone');

if(user===savedUser && phone===savedPhone){
localStorage.setItem('dishariLogin','true');
openHome(user);
toast('Login Success');
}else{
toast('Invalid User ID or Password');
}
}

function openHome(user){
document.getElementById('authPage').style.display='none';
document.getElementById('homePage').style.display='block';
document.getElementById('userText').innerText=user;
}

function logoutUser(){
localStorage.removeItem('dishariLogin');
document.getElementById('homePage').style.display='none';
document.getElementById('authPage').style.display='block';
}

function forgotPassword(){
const phone=localStorage.getItem('dishariPhone');

if(phone){
toast('Your password is XXXXXXX'+phone.slice(-3));
}else{
toast('No account found');
}
}

window.onload=function(){
const login=localStorage.getItem('dishariLogin');
const user=localStorage.getItem('dishariUser');

if(login==='true' && user){
openHome(user);
}
}

</script>

</body>
</html>
