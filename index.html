<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Dishari Login</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial,sans-serif;
}

body{
background:#f3f6fb;
min-height:100vh;
display:flex;
justify-content:center;
align-items:center;
padding:20px;
overflow:hidden;
}

.auth-page{
width:100%;
max-width:420px;
background:#fff;
padding:30px 24px;
border-radius:28px;
box-shadow:0 10px 30px rgba(0,0,0,0.08);
animation:fade .5s ease;
}

.logo{
text-align:center;
font-size:34px;
font-weight:bold;
color:#1877F2;
margin-bottom:10px;
}

.sub{
text-align:center;
color:#666;
margin-bottom:30px;
font-size:14px;
}

.input-box{
margin-bottom:16px;
}

.input-box input{
width:100%;
padding:15px;
border:none;
outline:none;
background:#f1f4f9;
border-radius:16px;
font-size:15px;
transition:.3s;
}

.input-box input:focus{
background:#e8f0ff;
box-shadow:0 0 0 2px #1877F2;
}

.main-btn{
width:100%;
padding:15px;
border:none;
border-radius:16px;
background:#1877F2;
color:#fff;
font-size:16px;
font-weight:bold;
cursor:pointer;
}

.links{
display:flex;
justify-content:space-between;
margin-top:18px;
font-size:14px;
}

.links span{
color:#1877F2;
cursor:pointer;
}

.signup-box{
display:none;
margin-top:24px;
animation:slide .4s ease;
}

.toast{
position:fixed;
bottom:25px;
left:50%;
transform:translateX(-50%);
background:#111;
color:#fff;
padding:14px 18px;
border-radius:14px;
font-size:14px;
display:none;
z-index:999;
}

.home-page{
display:none;
width:100%;
height:100vh;
background:#fff;
padding:25px;
}

.home-box{
background:#1877F2;
color:#fff;
padding:20px;
border-radius:24px;
font-size:24px;
font-weight:bold;
}

.logout-btn{
margin-top:30px;
width:100%;
padding:15px;
border:none;
border-radius:16px;
background:#1877F2;
color:#fff;
font-size:16px;
font-weight:bold;
}

@keyframes fade{
from{
opacity:0;
transform:translateY(20px);
}
to{
opacity:1;
transform:translateY(0);
}
}

@keyframes slide{
from{
opacity:0;
transform:translateY(20px);
}
to{
opacity:1;
transform:translateY(0);
}
}

</style>
</head>

<body>

<!-- LOGIN PAGE -->
<div class="auth-page" id="authPage">

<div class="logo">Dishari</div>
<div class="sub">Premium Fashion Shopping App</div>

<div class="input-box">
<input type="text" id="loginUser" placeholder="Enter User ID">
</div>

<div class="input-box">
<input type="tel" id="loginPhone" placeholder="Enter Mobile Number">
</div>

<button class="main-btn" onclick="loginUser()">
Sign In
</button>

<div class="links">
<span onclick="forgotPassword()">Forgot Password</span>
<span onclick="toggleSignup()">Create Account</span>
</div>

<!-- SIGNUP -->
<div class="signup-box" id="signupBox">

<div class="input-box">
<input type="text" id="signupUser" placeholder="Enter Your Name">
</div>

<div class="input-box">
<input type="tel" id="signupPhone" placeholder="Enter Mobile Number">
</div>

<button class="main-btn" onclick="signupUser()">
Sign Up
</button>

</div>

</div>

<!-- HOME -->
<div class="home-page" id="homePage">

<div class="home-box">
Hi, <span id="userText"></span>
</div>

<button class="logout-btn" onclick="logoutUser()">
Logout
</button>

</div>

<!-- TOAST -->
<div class="toast" id="toast"></div>

<script>

/* =========================
   GOOGLE SHEET JSON
========================= */

const USERS_API = "https://opensheet.elk.sh/12klOqNz4ER47bvsZrvqJMkYnghi_T63J_LmaYvNeb9c/Users";

/* =========================
   GOOGLE FORM
========================= */

/*
IMPORTANT

REPLACE THESE 2 ENTRY IDs
WITH YOUR REAL GOOGLE FORM ENTRY IDs
*/

const FORM_URL = "https://docs.google.com/forms/d/e/1FAIpQLSfVFoHr73Z96fIijg-Yjk0909cMEuGpc4-vZl3gLGWhuaM7Rg/formResponse";

const USER_ENTRY = "entry.1111111111";
const PHONE_ENTRY = "entry.2222222222";

/* =========================
   TOAST
========================= */

function toast(msg){

const t=document.getElementById("toast");

t.innerText=msg;

t.style.display="block";

setTimeout(()=>{
t.style.display="none";
},2500);

}

/* =========================
   TOGGLE SIGNUP
========================= */

function toggleSignup(){

const box=document.getElementById("signupBox");

if(box.style.display==="block"){
box.style.display="none";
}else{
box.style.display="block";
}

}

/* =========================
   SIGNUP
========================= */

async function signupUser(){

const user=document.getElementById("signupUser").value.trim();

const phone=document.getElementById("signupPhone").value.trim();

/* VALIDATION */

if(user.length<6){

toast("Minimum six characters required");

return;

}

if(phone.length!==10){

toast("Wrong Phone Number");

return;

}

/* SAVE TO GOOGLE FORM */

const formData = new FormData();

formData.append(USER_ENTRY,user);

formData.append(PHONE_ENTRY,phone);

try{

await fetch(FORM_URL,{
method:"POST",
mode:"no-cors",
body:formData
});

/* LOCAL STORAGE */

localStorage.setItem("dishariLogin","true");

localStorage.setItem("dishariUser",user);

openHome(user);

toast("Signup Success");

}catch(e){

toast("Signup Failed");

}

}

/* =========================
   LOGIN
========================= */

async function loginUser(){

const user=document.getElementById("loginUser").value.trim();

const phone=document.getElementById("loginPhone").value.trim();

if(!user || !phone){

toast("Enter Login Details");

return;

}

try{

const res = await fetch(USERS_API);

const data = await res.json();

const found = data.find(item =>

(item["User ID"]===user || item["User Name"]===user || item["O"]===user)
&&
(item["Password"]===phone || item["User Phone"]===phone || item["P"]===phone)

);

if(found){

localStorage.setItem("dishariLogin","true");

localStorage.setItem("dishariUser",user);

openHome(user);

toast("Login Success");

}else{

toast("Invalid User ID or Password");

}

}catch(e){

toast("Connection Error");

}

}

/* =========================
   HOME
========================= */

function openHome(user){

document.getElementById("authPage").style.display="none";

document.getElementById("homePage").style.display="block";

document.getElementById("userText").innerText=user;

}

/* =========================
   LOGOUT
========================= */

function logoutUser(){

localStorage.removeItem("dishariLogin");

document.getElementById("homePage").style.display="none";

document.getElementById("authPage").style.display="block";

}

/* =========================
   FORGOT PASSWORD
========================= */

async function forgotPassword(){

const user = prompt("Enter Your User ID");

if(!user) return;

try{

const res = await fetch(USERS_API);

const data = await res.json();

const found = data.find(item =>

(item["User ID"]===user || item["User Name"]===user || item["O"]===user)

);

if(found){

const phone =
found["Password"] ||
found["User Phone"] ||
found["P"];

toast("Password: XXXXXXX"+phone.slice(-3));

}else{

toast("User Not Found");

}

}catch(e){

toast("Connection Error");

}

}

/* =========================
   AUTO LOGIN
========================= */

window.onload=function(){

/* REMOVE THIS LINE IF YOU WANT LOGIN EVERY TIME */

/* localStorage.clear(); */

const login = localStorage.getItem("dishariLogin");

const user = localStorage.getItem("dishariUser");

if(login==="true" && user){

openHome(user);

}

}

</script>

</body>
</html>
